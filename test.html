<!DOCTYPE html>
<html>
<body>
<div id="out">esperando...</div>
<button onclick="test()">Test Chat</button>
<script>
async function test(){
  document.getElementById('out').textContent = 'enviando...';
  try {
    const res = await fetch('http://localhost:11434/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'llama3.2:3b',messages:[{role:'user',content:'hola'}],stream:false})
    });
    const text = await res.text();
    document.getElementById('out').textContent = 'respuesta: ' + text.slice(0,200);
  } catch(e) {
    document.getElementById('out').textContent = 'ERROR: ' + e.message + ' / ' + e.name;
  }
}
</script>
</body>
</html>
